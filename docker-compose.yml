services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "30MB"

  api1:
    build: .
    expose:
      - "8080"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  api2:
    build: .
    expose:
      - "8080"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

networks:
  backend:
    driver: bridge
